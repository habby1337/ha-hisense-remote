name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

      - name: Cache Python virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements-dev.txt', '.mise.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.12-

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Lint and test
        run: mise run check
