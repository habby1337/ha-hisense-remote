name: Automerge release PR

on:
  pull_request:
    types: [labeled, synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: "${{ startsWith(github.head_ref, 'release-please--') && contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}"
    runs-on: ubuntu-latest
    steps:
      - name: Merge release PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number,
                merge_method: "squash",
              });
              core.info(`Merged release PR #${pull_number}`);
            } catch (error) {
              if (error.status !== 405) {
                throw error;
              }
              await github.rest.pulls.enableAutoMerge({
                owner,
                repo,
                pull_number,
                merge_method: "squash",
              });
              core.info(`Enabled auto-merge on release PR #${pull_number}`);
            }
