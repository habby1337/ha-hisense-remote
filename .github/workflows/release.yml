name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(jq -r .version custom_components/hisense_vidaa/manifest.json)
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag v$TAG does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
