name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  merge-release-pr:
    needs: release-please
    if: github.event_name == 'push' && needs.release-please.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Merge release PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const head = "release-please--branches--main--components--ha-hisense-remote";

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${head}`,
              base: "main",
            });

            const releasePr = prs.find((pr) =>
              pr.labels.some((label) => label.name === "autorelease: pending"),
            );

            if (!releasePr) {
              core.info("No open release PR to merge");
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: releasePr.number,
                merge_method: "rebase",
              });
              core.info(`Merged release PR #${releasePr.number}`);
            } catch (error) {
              core.warning(
                `Could not merge release PR #${releasePr.number}: ${error.message}`,
              );
              core.info(
                "Ensure github-actions[bot] is in the main ruleset bypass list",
              );
            }

  publish-release:
    needs: release-please
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' ||
        (needs.release-please.result == 'success' &&
          needs.release-please.outputs.release_created != 'true' &&
          startsWith(github.event.head_commit.message, 'chore(main): release')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const manifest = JSON.parse(
              fs.readFileSync("custom_components/hisense_vidaa/manifest.json", "utf8"),
            );
            const version = manifest.version;
            const tag = `v${version}`;

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.info(`Release ${tag} already exists`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const sha = context.sha;

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/tags/${tag}`,
                  sha,
                });
              } else {
                throw error;
              }
            }

            let body = `Release ${version}`;
            if (fs.existsSync("CHANGELOG.md")) {
              body = fs.readFileSync("CHANGELOG.md", "utf8");
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              body,
              name: tag,
              target_commitish: sha,
            });

            core.info(`Published ${tag}`);
