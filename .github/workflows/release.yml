name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-release:
    needs: release-please
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' ||
        (needs.release-please.result == 'success' &&
          needs.release-please.outputs.release_created != 'true' &&
          startsWith(github.event.head_commit.message, 'chore(main): release')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const manifest = JSON.parse(
              fs.readFileSync("custom_components/hisense_vidaa/manifest.json", "utf8"),
            );
            const version = manifest.version;
            const tag = `v${version}`;

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.info(`Release ${tag} already exists`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const sha = context.sha;

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/tags/${tag}`,
                  sha,
                });
              } else {
                throw error;
              }
            }

            let body = `Release ${version}`;
            if (fs.existsSync("CHANGELOG.md")) {
              body = fs.readFileSync("CHANGELOG.md", "utf8");
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              body,
              name: tag,
              target_commitish: sha,
            });

            core.info(`Published ${tag}`);
