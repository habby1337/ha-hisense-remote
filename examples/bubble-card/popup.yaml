# Hisense VIDAA — Bubble Card pop-up remote
#
# Paste into a second card YAML editor on the same dashboard view.
# Find & Replace:
#   media_player.hisense_tv
#   remote.hisense_tv_remote
#
# Opened by slider.yaml via navigation_path "#hisense-remote".

type: custom:bubble-card
card_type: pop-up
hash: "#hisense-remote"
name: Hisense TV
icon: mdi:remote-tv
show_header: true
show_close_button: true
bg_color: "#1c1c1e"
bg_opacity: "100"
shadow_opacity: "0"
close_by_clicking_outside: true
cards:
  - type: custom:bubble-card
    card_type: button
    button_type: state
    entity: media_player.hisense_tv
    name: Active Source
    icon: mdi:hdmi-port
    show_state: false
    show_attribute: true
    attribute: source
    tap_action:
      action: more-info
    styles: |-
      :host {
        --bubble-main-background-color: #2c2c2e;
        --bubble-icon-color: #f2f2f2;
        --bubble-name-color: #f2f2f2;
      }

  - type: horizontal-stack
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Power
        icon: mdi:power
        tap_action:
          action: perform-action
          perform_action: media_player.toggle
          target:
            entity_id: media_player.hisense_tv
        styles: |-
          {% if is_state('media_player.hisense_tv', 'on') %}
          :host { --bubble-main-background-color: #1c3d1c; --bubble-icon-color: #34c759; }
          {% else %}
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #8e8e93; }
          {% endif %}

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Mute
        icon: mdi:volume-off
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
            command: volume_mute
        styles: |-
          :host { --bubble-main-background-color: #3a3a3c; --bubble-icon-color: #f2f2f2; }

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Home
        icon: mdi:home
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
            command: home
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Back
        icon: mdi:arrow-left
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
            command: back
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Menu
        icon: mdi:menu
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
            command: menu
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

  - type: horizontal-stack
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Vol -
        icon: mdi:volume-minus
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
            command: volume_down
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: media_player.hisense_tv
        name: Volume
        icon: mdi:volume-high
        show_icon: true
        show_name: false
        read_only_slider: true
        slider_value_position: center
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Vol +
        icon: mdi:volume-plus
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
            command: volume_up
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

  - type: vertical-stack
    cards:
      - type: horizontal-stack
        cards:
          - type: custom:bubble-card
            card_type: empty-column
          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Up
            icon: mdi:chevron-up
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: up
            styles: |-
              :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }
          - type: custom:bubble-card
            card_type: empty-column

      - type: horizontal-stack
        cards:
          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Left
            icon: mdi:chevron-left
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: left
            styles: |-
              :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: OK
            icon: mdi:circle
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: center
            styles: |-
              :host { --bubble-main-background-color: #3a3a3c; --bubble-icon-color: #d1d1d6; }

          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Right
            icon: mdi:chevron-right
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: right
            styles: |-
              :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

      - type: horizontal-stack
        cards:
          - type: custom:bubble-card
            card_type: empty-column
          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Down
            icon: mdi:chevron-down
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: down
            styles: |-
              :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }
          - type: custom:bubble-card
            card_type: empty-column

  - type: horizontal-stack
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Play/Pause
        icon: mdi:play-pause
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
            command: play_pause
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Stop
        icon: mdi:stop
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
            command: stop
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

  - type: custom:bubble-card
    card_type: separator
    name: Inputs

  - type: horizontal-stack
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: TV
        icon: mdi:antenna
        tap_action:
          action: perform-action
          perform_action: media_player.select_source
          target:
            entity_id: media_player.hisense_tv
          data:
            source: tv
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: AV
        icon: mdi:video-input-component
        tap_action:
          action: perform-action
          perform_action: media_player.select_source
          target:
            entity_id: media_player.hisense_tv
          data:
            source: av
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: HDMI 1
        icon: mdi:hdmi-port
        tap_action:
          action: perform-action
          perform_action: media_player.select_source
          target:
            entity_id: media_player.hisense_tv
          data:
            source: hdmi1
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: HDMI 2
        icon: mdi:hdmi-port
        tap_action:
          action: perform-action
          perform_action: media_player.select_source
          target:
            entity_id: media_player.hisense_tv
          data:
            source: hdmi2
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

  - type: custom:bubble-card
    card_type: separator
    name: Apps

  - type: horizontal-stack
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Netflix
        icon: mdi:netflix
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
            command: netflix
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #e50914; }

      - type: custom:bubble-card
