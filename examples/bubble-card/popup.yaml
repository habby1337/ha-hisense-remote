# Hisense VIDAA — Bubble Card pop-up remote
#
# Paste into a second card YAML editor on the same dashboard view.
# Find & Replace:
#   media_player.hisense_tv
#   remote.hisense_tv_remote
#
# Opened by slider.yaml via navigation_path "#hisense-remote".
#

type: custom:bubble-card
card_type: pop-up
hash: "#hisense-remote"
name: Hisense TV
icon: mdi:remote-tv
show_header: true
show_close_button: true
close_by_clicking_outside: true
cards:
  - type: custom:bubble-card
    card_type: button
    button_type: state
    entity: media_player.hisense_tv
    name: Active Source
    icon: mdi:hdmi-port
    show_state: false
    show_attribute: true
    attribute: source
    tap_action:
      action: more-info

  - type: custom:bubble-card
    card_type: sub-buttons
    hide_main_background: true
    rows: 1.05
    sub_button:
      main: []
      bottom:
        - buttons_layout: inline
          justify_content: fill
          group:
            - entity: media_player.hisense_tv
              icon: mdi:power
              show_name: false
              show_background: false
              custom_height: 56
              tap_action:
                action: toggle
            - name: Mute
              icon: mdi:volume-off
              show_name: false
              show_background: false
              custom_height: 56
              tap_action:
                action: perform-action
                perform_action: remote.send_command
                target:
                  entity_id: remote.hisense_tv_remote
                data:
                  command: volume_mute
            - name: Home
              icon: mdi:home
              show_name: false
              show_background: false
              custom_height: 56
              tap_action:
                action: perform-action
                perform_action: remote.send_command
                target:
                  entity_id: remote.hisense_tv_remote
                data:
                  command: home
            - name: Back
              icon: mdi:arrow-left
              show_name: false
              show_background: false
              custom_height: 56
              tap_action:
                action: perform-action
                perform_action: remote.send_command
                target:
                  entity_id: remote.hisense_tv_remote
                data:
                  command: back
            - name: Menu
              icon: mdi:menu
              show_name: false
              show_background: false
              custom_height: 56
              tap_action:
                action: perform-action
                perform_action: remote.send_command
                target:
                  entity_id: remote.hisense_tv_remote
                data:
                  command: menu
    styles: |
      .bubble-sub-button {
        height: 56px !important;
        width: 56px !important;
      }
      .bubble-sub-button > ha-icon {
        --mdc-icon-size: 28px !important;
      }
      .bubble-sub-button-1 > ha-icon {
        color: ${hass.states['media_player.hisense_tv'].state === 'on' ? 'var(--success-color)' : 'var(--error-color)'} !important;
      }

  - type: custom:bubble-card
    card_type: sub-buttons
    hide_main_background: true
    rows: 0.85
    sub_button:
      main: []
      bottom:
        - buttons_layout: inline
          justify_content: fill
          group:
            - name: Vol -
              icon: mdi:volume-minus
              show_name: false
              show_background: false
              fill_width: false
              custom_height: 46
              width: 46
              tap_action:
                action: perform-action
                perform_action: remote.send_command
                target:
                  entity_id: remote.hisense_tv_remote
                data:
                  command: volume_down
            - entity: media_player.hisense_tv
              sub_button_type: slider
              show_name: false
              show_icon: false
              show_button_info: false
              show_background: false
              always_visible: true
              read_only_slider: true
              slider_value_position: center
              fill_width: true
              custom_height: 46
            - name: Vol +
              icon: mdi:volume-plus
              show_name: false
              show_background: false
              fill_width: false
              custom_height: 46
              width: 46
              tap_action:
                action: perform-action
                perform_action: remote.send_command
                target:
                  entity_id: remote.hisense_tv_remote
                data:
                  command: volume_up
    styles: |
      .bubble-sub-button-1,
      .bubble-sub-button-3 {
        height: 46px !important;
        width: 46px !important;
        min-width: 46px !important;
        max-width: 46px !important;
        flex: 0 0 46px !important;
      }
      .bubble-sub-button-1 > ha-icon,
      .bubble-sub-button-3 > ha-icon {
        --mdc-icon-size: 24px !important;
      }
      .bubble-sub-button-2 {
        flex: 1 1 auto !important;
        min-width: 0 !important;
      }

  - type: custom:bubble-card
    card_type: sub-buttons
    hide_main_background: true
    rows: 0.85
    sub_button:
      main: []
      bottom:
        - buttons_layout: inline
          justify_content: center
          group:
            - name: Up
              icon: mdi:chevron-up
              show_name: false
              show_background: false
              fill_width: false
              tap_action:
                action: perform-action
                perform_action: remote.send_command
                target:
                  entity_id: remote.hisense_tv_remote
                data:
                  command: up
    styles: |
      .bubble-sub-button {
        height: 46px !important;
        width: 46px !important;
      }
      .bubble-sub-button-icon {
        --mdc-icon-size: inherit !important;
      }

  - type: custom:bubble-card
    card_type: sub-buttons
    hide_main_background: true
    rows: 0.85
    sub_button:
      main: []
      bottom:
        - buttons_layout: inline
          justify_content: fill
          group:
            - name: Left
              icon: mdi:chevron-left
              show_name: false
              show_background: false
              tap_action:
