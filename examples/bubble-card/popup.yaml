                target:
                  entity_id: remote.hisense_tv_remote
                data:
                  command: stop
    styles: |
      .bubble-sub-button {
        height: 46px !important;
        width: 46px !important;
      }
      .bubble-sub-button-icon {
        --mdc-icon-size: inherit !important;
      }

  - type: custom:bubble-card
    card_type: separator
    name: Inputs

  - type: horizontal-stack
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: TV
        icon: mdi:antenna
        tap_action:
          action: perform-action
          perform_action: media_player.select_source
          target:
            entity_id: media_player.hisense_tv
          data:
            source: tv

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: AV
        icon: mdi:video-input-component
        tap_action:
          action: perform-action
          perform_action: media_player.select_source
          target:
            entity_id: media_player.hisense_tv
          data:
            source: av

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: HDMI 1
        icon: mdi:hdmi-port
        tap_action:
          action: perform-action
          perform_action: media_player.select_source
          target:
            entity_id: media_player.hisense_tv
          data:
            source: hdmi1

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: HDMI 2
        icon: mdi:hdmi-port
        tap_action:
          action: perform-action
          perform_action: media_player.select_source
          target:
            entity_id: media_player.hisense_tv
          data:
            source: hdmi2

  - type: custom:bubble-card
    card_type: separator
    name: Apps

  - type: horizontal-stack
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Netflix
        icon: mdi:netflix
