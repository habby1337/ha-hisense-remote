# Hisense VIDAA — Bubble Card opener
#
# Paste into a single card YAML editor.
# Find & Replace: media_player.hisense_tv
#
# Drag the band to change volume. Tap the icon or name to open the remote.

type: custom:bubble-card
card_type: button
button_type: slider
entity: media_player.hisense_tv
name: Hisense TV
icon: mdi:remote-tv
show_name: true
show_icon: true
show_state: false
card_layout: large
slider_fill_orientation: left
slider_value_position: hidden
tap_action:
  action: navigate
  navigation_path: "#hisense-remote"
button_action:
  tap_action:
    action: navigate
    navigation_path: "#hisense-remote"
sub_button:
  - name: Play/Pause
    icon: mdi:play-pause
    show_name: false
    show_icon: true
    show_background: false
    tap_action:
      action: perform-action
      perform_action: media_player.media_play_pause
      target:
        entity_id: media_player.hisense_tv
