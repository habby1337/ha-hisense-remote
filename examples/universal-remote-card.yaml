# Example Universal Remote Card configuration for Hisense VIDAA.
# Replace entity IDs with your actual TV entities.

type: custom:universal-remote-card
platform: Generic Remote
remote_id: remote.living_room_remote
media_player_id: media_player.living_room
rows:
  - - power
  - - volume_up
    - slider
    - volume_down
    - mute
  - - up
  - - left
    - center
    - right
  - - down
  - - home
    - back
    - menu
  - - play_pause
    - stop
  - - netflix
    - youtube
custom_actions:
  - type: slider
    name: slider
    range: [0, 1]
    step: 0.01
    value_attribute: volume_level
    entity_id: media_player.living_room
    tap_action:
      action: perform-action
      perform_action: media_player.volume_set
      target:
        entity_id: media_player.living_room
      data:
        volume_level: "{{ value | float }}"
    vertical: true
    icon: mdi:volume-high
