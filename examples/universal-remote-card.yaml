# Hisense VIDAA — Universal Remote Card
#
# Requirements: HACS → Universal Remote Card
# Replace entity IDs with your TV entities.
#
# Generic Remote only ships a few built-in source shortcuts (e.g. tv, netflix).
# AV/HDMI inputs are defined as custom buttons below.
# Apps and inputs are sent as remote.send_command keys and handled by the integration.

type: custom:universal-remote-card
platform: Generic Remote
remote_id: remote.hisense_tv_remote
media_player_id: media_player.hisense_tv
title: Hisense TV
rows:
  - - power
  - - volume_buttons
  - - dpad
  - - home
    - back
    - menu
  - - play_pause
    - stop
  - - tv
    - av
    - hdmi1
    - hdmi2
  - - netflix
    - youtube
custom_actions:
  - type: button
    name: av
    icon: mdi:video-input-component
    tap_action:
      action: key
      key: av
  - type: button
    name: hdmi1
    icon: mdi:hdmi-port
    tap_action:
      action: key
      key: hdmi1
  - type: button
    name: hdmi2
    icon: mdi:hdmi-port
    tap_action:
      action: key
      key: hdmi2
  - type: slider
    name: slider
    range: [0, 1]
    step: 0.01
    value_attribute: volume_level
    entity_id: media_player.hisense_tv
    tap_action:
      action: perform-action
      perform_action: media_player.volume_set
      target:
        entity_id: media_player.hisense_tv
      data:
        volume_level: "{{ value | float }}"
    vertical: true
    icon: mdi:volume-high
