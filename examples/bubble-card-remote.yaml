  - type: custom:bubble-card
    card_type: separator
    name: Apps

  - type: horizontal-stack
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Netflix
        icon: mdi:netflix
        tap_action:
          action: perform-action
          perform_action: hisense_vidaa.launch_app
          data:
            app: netflix
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #e50914; }
      - type: custom:bubble-card
        card_type: button
