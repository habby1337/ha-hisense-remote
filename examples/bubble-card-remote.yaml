        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Menu
        icon: mdi:menu
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
            command: menu
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

  - type: custom:bubble-card
    card_type: separator
    name: Inputs

  - type: horizontal-stack
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: TV
        icon: mdi:antenna
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
            command: tv
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }
      - type: custom:bubble-card
        card_type: button
        button_type: name
