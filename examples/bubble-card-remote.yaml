      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Back
        icon: mdi:arrow-left
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
            command: back
        styles: |-
          :host { --bubble-main-background-color: #2c2c2e; --bubble-icon-color: #f2f2f2; }

      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Right
        icon: mdi:chevron-right
        tap_action:
          action: perform-action
          perform_action: remote.send_command
          target:
            entity_id: remote.hisense_tv_remote
          data:
