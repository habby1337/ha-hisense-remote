# Hisense VIDAA — custom dashboard (native Lovelace)
#
# Paste as a dashboard view or adapt to sections layout.
# Replace entity IDs with your TV entities.

title: Hisense TV
path: hisense-tv
type: panel
cards:
  - type: vertical-stack
    cards:
      - type: entities
        title: TV Status
        show_header_toggle: false
        entities:
          - entity: media_player.hisense_tv
            name: Hisense TV
            secondary_info: last-changed

      - type: entities
        title: Input / App
        show_header_toggle: false
        entities:
          - entity: media_player.hisense_tv
            name: Active Source

      - type: grid
        columns: 3
        square: false
        cards:
          - type: button
            name: Power
            icon: mdi:power
            tap_action:
              action: perform-action
              perform_action: media_player.toggle
              target:
                entity_id: media_player.hisense_tv
            hold_action:
              action: none

          - type: button
            name: Mute
            icon: mdi:volume-off
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: volume_mute

          - type: button
            name: Home
            icon: mdi:home
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: home

          - type: button
            name: Vol -
            icon: mdi:volume-minus
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: volume_down

          - type: tile
            entity: media_player.hisense_tv
            name: Volume
            icon: mdi:volume-high
            features:
              - type: media-player-volume
            hide_state: true
            vertical: false

          - type: button
            name: Vol +
            icon: mdi:volume-plus
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: volume_up

          - type: button
            name: Up
            icon: mdi:chevron-up
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: up

          - type: button
            name: OK
            icon: mdi:circle
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: center

          - type: button
            name: Down
            icon: mdi:chevron-down
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: down

          - type: button
            name: Left
            icon: mdi:chevron-left
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: left

          - type: button
            name: Back
            icon: mdi:arrow-left
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: back

          - type: button
            name: Right
            icon: mdi:chevron-right
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: right

          - type: button
            name: Menu
            icon: mdi:menu
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: menu

          - type: button
            name: Play/Pause
            icon: mdi:play-pause
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: play_pause

          - type: button
            name: Stop
            icon: mdi:stop
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: stop

      - type: markdown
        content: "### Video Inputs"

      - type: grid
        columns: 4
        square: false
        cards:
          - type: button
            name: TV
            icon: mdi:antenna
            tap_action:
              action: perform-action
              perform_action: media_player.select_source
              target:
                entity_id: media_player.hisense_tv
              data:
                source: tv

          - type: button
            name: AV
            icon: mdi:video-input-component
            tap_action:
              action: perform-action
              perform_action: media_player.select_source
              target:
                entity_id: media_player.hisense_tv
              data:
                source: av

          - type: button
            name: HDMI 1
            icon: mdi:hdmi-port
            tap_action:
              action: perform-action
              perform_action: media_player.select_source
              target:
                entity_id: media_player.hisense_tv
              data:
                source: hdmi1

          - type: button
            name: HDMI 2
            icon: mdi:hdmi-port
            tap_action:
              action: perform-action
              perform_action: media_player.select_source
              target:
                entity_id: media_player.hisense_tv
              data:
                source: hdmi2

      - type: markdown
        content: "### Apps"

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Netflix
            icon: mdi:netflix
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: netflix

          - type: button
            name: YouTube
            icon: mdi:youtube
            tap_action:
              action: perform-action
              perform_action: remote.send_command
              target:
                entity_id: remote.hisense_tv_remote
              data:
                command: youtube
